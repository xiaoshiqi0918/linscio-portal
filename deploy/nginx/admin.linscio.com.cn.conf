# Admin 静态站 + /api/*、/admin/* 反代。
# SSL：将腾讯云/Let's Encrypt 证书 fullchain 与私钥放到下列路径（可与通配符 *.linscio.com.cn 共用）。
# 访问控制：下方 allow 列表须包含管理员固定公网 IP；须与 api 服务 .env 中 ADMIN_IPS 一致（生产环境 FastAPI 会校验管理员 API）。
server {
    listen 443 ssl;
    server_name admin.linscio.com.cn;
    ssl_certificate     /etc/nginx/ssl/admin.linscio.com.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/admin.linscio.com.cn.key;

    allow 127.0.0.1;
    # allow 203.0.113.10;
    # allow 2001:db8::1;
    deny all;

    root /www/wwwroot/linscio-release/admin;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
