server {
    listen 443 ssl;
    server_name admin.linscio.com.cn;
    ssl_certificate     /etc/nginx/ssl/admin.linscio.com.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/admin.linscio.com.cn.key;

    # IP whitelist — replace with actual admin IP(s)
    allow 127.0.0.1;
    # allow YOUR_ADMIN_IP;
    deny all;

    root /home/linscio/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
