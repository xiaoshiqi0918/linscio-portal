server {
    listen 443 ssl;
    server_name portal.linscio.com.cn;
    ssl_certificate     /www/server/panel/vhost/cert/portal.linscio.com.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/portal.linscio.com.cn/privkey.pem;

    root /www/wwwroot/linscio-release/portal;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
