# HTTP → HTTPS redirect
server {
    listen 80;
    server_name www.linscio.com.cn medcomm.linscio.com.cn schola.linscio.com.cn
                qcc.linscio.com.cn stats.linscio.com.cn docs.linscio.com.cn
                portal.linscio.com.cn admin.linscio.com.cn api.linscio.com.cn;
    return 301 https://$host$request_uri;
}

# Catch-all: close unmatched connections
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    ssl_certificate     /www/server/panel/vhost/cert/www.linscio.com.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/www.linscio.com.cn/privkey.pem;
    return 444;
}
